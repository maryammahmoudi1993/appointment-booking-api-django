[tool.ruff]
target-version = "py312"
line-length = 88
exclude = ["*/migrations/*", ".venv", "node_modules", "frontend/dist"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"config/settings/*" = ["E402", "F405"]
"tests/*" = ["N806"]

[tool.ruff.format]
quote-style = "double"

[tool.black]
line-length = 88
target-version = ["py312"]

[tool.coverage.run]
source = ["apps", "core"]
omit = ["*/migrations/*", "*/tests/*", "*/management/commands/*", "core/utils.py"]

[tool.coverage.report]
fail_under = 79
show_missing = true
