services:
  - type: web
    name: bloomflow-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    # The previous `runtime: python` + buildCommand never built the React
    # frontend (no npm install/build step), and frontend/dist is gitignored
    # — so the deployed service had no static assets/SPA shell to serve at
    # all. The Dockerfile already does a correct multi-stage build (Node
    # stage builds frontend/dist, then it's copied into the Python image),
    # so use it directly instead of duplicating that logic in buildCommand.
    preDeployCommand: python manage.py migrate
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: booking-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://bloomflow-ai.onrender.com
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: booking-db
    plan: free
    databaseName: booking_db
