name: CI

on:
  push:
    branches: [main, "back/**", "front/**", "ai/**"]
  pull_request:
    branches: [main]

env:
  DJANGO_SECRET_KEY: ci-test-key-not-for-production
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/booking_db
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: localhost
  CORS_ALLOWED_ORIGINS: http://localhost:5173

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  backend-tests:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: booking_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
      - name: Django system checks
        run: python manage.py check
      - name: Migration consistency check
        run: python manage.py makemigrations --check --dry-run
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=apps --cov=core --cov-report=term-missing --cov-fail-under=80

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Audit production dependencies
        run: python -m pip_audit -r requirements/prod.txt
